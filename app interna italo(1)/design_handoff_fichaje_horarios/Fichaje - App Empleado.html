<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fichaje — App empleado</title>
<style>
  :root{
    --ink:#1c2024; --muted:#7a8087; --muted2:#9aa3ab; --line:#e8eaed;
    --card:#f6f7f9; --panel:#eef0f2; --bubble:#ededf0;
    --blue:#2f78e8; --blueBtn:#5b86f0; --navy:#2b1f5c; --green:#1f9d57; --red:#e2543b;
    /* accent is driven by the Tweak (used by fichaje/QR actions) */
    --accent:#2f78e8; --accentInk:#fff; --accentSoft:#e9f1fd; --accentLine:#cfe0f9;
    /* semantic agenda colors */
    --turno:#2f86d6; --turnoSoft:#e7f2fb; --turnoLine:#c6e1f4;       /* celeste */
    --licencia:#7b5ce0; --licenciaSoft:#efeafb; --licenciaLine:#dacef3; /* morado */
    --actividad:#1f9d57; --actividadSoft:#e7f6ee; --actividadLine:#c4e7d2; /* verde */
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:#dfe2e6; color:var(--ink);
    display:flex; flex-direction:column; align-items:center; min-height:100%;
    padding:22px 12px 40px; gap:14px;
  }
  .demo-hint{ font-size:12px; color:#5d636b; max-width:392px; text-align:center; line-height:1.5; }
  .demo-hint b{ color:#33373c; }
  a.xlink{ color:#3a6fd0; font-weight:600; text-decoration:none; }

  /* ---------- phone ---------- */
  .phone{
    width:392px; max-width:100%; height:812px; background:#fff; border-radius:30px;
    position:relative; overflow:hidden;
    box-shadow:0 18px 50px rgba(20,24,30,.28), 0 0 0 9px #11151b, 0 0 0 10px #2a2f37;
  }
  .statusbar{
    height:34px; display:flex; align-items:center; justify-content:space-between; padding:0 22px;
    font-size:13px; font-weight:600; color:#22262b; background:#fff; position:relative; z-index:5;
  }
  .sb-right{ display:flex; align-items:center; gap:6px; }
  .sb-right .bar{ width:3px; border-radius:1px; background:#22262b; }
  .sb-batt{ font-size:10px; background:#22262b; color:#fff; border-radius:5px; padding:1px 5px; font-weight:700; }

  .stage{ position:absolute; inset:34px 0 0; display:flex; flex-direction:column; overflow:hidden; }

  /* ---------- generic screen header ---------- */
  .scr{ flex:1 1 auto; display:flex; flex-direction:column; overflow:hidden; background:#fff; }
  .scr-head{ padding:14px 20px 6px; flex:0 0 auto; }
  .scr-title{ font-size:21px; font-weight:800; letter-spacing:-.01em; }
  .scr-sub{ font-size:13px; color:var(--muted); margin-top:2px; }
  .scr-body{ flex:1 1 auto; overflow-y:auto; padding:6px 16px 96px; }
  .scr-body::-webkit-scrollbar{ width:0; }

  /* month nav + segmented */
  .monthnav{ display:flex; align-items:center; justify-content:space-between; padding:6px 4px 12px; }
  .monthnav .m{ font-size:17px; font-weight:700; }
  .navbtn{ width:34px; height:34px; border-radius:50%; border:0; background:var(--panel); color:#5a6068;
    display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .seg{ display:flex; background:var(--panel); border-radius:12px; padding:4px; gap:4px; }
  .seg button{ flex:1; border:0; background:transparent; font:inherit; font-weight:600; font-size:14px;
    color:#5a6068; padding:9px 0; border-radius:9px; cursor:pointer; transition:.16s; }
  .seg button.on{ background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.12); }

  /* ---------- shift card (work schedule = turno, celeste) ---------- */
  .shift{
    border:1px solid var(--turnoLine); background:var(--turnoSoft); border-radius:18px;
    padding:16px 16px 14px; margin:14px 0 18px; position:relative; overflow:hidden;
  }
  .shift .tag{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700;
    color:var(--turno); background:#fff; border:1px solid var(--turnoLine); padding:5px 10px;
    border-radius:999px; letter-spacing:.01em; }
  .shift .when{ display:flex; align-items:flex-end; gap:14px; margin:14px 0 4px; }
  .shift .blk{ display:flex; flex-direction:column; gap:2px; }
  .shift .blk .lab{ font-size:11.5px; font-weight:700; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
  .shift .blk .val{ font-size:28px; font-weight:800; letter-spacing:-.02em; line-height:1; }
  .shift .arrow{ color:var(--turno); padding-bottom:5px; }
  .shift .sede{ display:flex; align-items:center; gap:7px; font-size:13.5px; color:#4b525a; margin-top:10px; }
  .shift .sede svg{ color:var(--turno); flex:0 0 auto; }
  .shift .fichar{ margin-top:14px; width:100%; border:0; background:var(--accent); color:var(--accentInk);
    border-radius:13px; padding:14px; font:inherit; font-weight:700; font-size:15.5px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:9px; }
  .shift .fichar:active{ filter:brightness(.95); }
  /* licencia variant (morado) */
  .shift.licencia{ border-color:var(--licenciaLine); background:var(--licenciaSoft); }
  .shift.licencia .tag{ color:var(--licencia); border-color:var(--licenciaLine); }
  .shift.licencia .restmsg{ font-size:15px; font-weight:600; color:#4b525a; margin-top:12px; }
  .shift.rest{ border-color:var(--line); background:var(--card); }
  .shift.rest .tag{ color:var(--muted); border-color:var(--line); }
  .shift.rest .restmsg{ font-size:15px; font-weight:600; color:#4b525a; margin-top:12px; }

  /* day timeline */
  .tl-head{ font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.05em;
    text-transform:uppercase; margin:6px 2px 8px; }
  .tl{ position:relative; }
  .tl-row{ display:flex; gap:12px; min-height:54px; }
  .tl-time{ width:46px; flex:0 0 auto; font-size:12.5px; color:var(--muted2); padding-top:0; transform:translateY(-7px); }
  .tl-track{ flex:1; border-top:1px solid var(--line); position:relative; padding:2px 0 12px; }
  .ev{ border-radius:11px; padding:10px 12px; margin-bottom:7px; display:flex; align-items:center; gap:10px; }
  .ev.actividad{ background:var(--actividadSoft); border:1px solid var(--actividadLine); }
  .ev.work{ background:var(--turnoSoft); border:1px solid var(--turnoLine); }
  .ev.licencia{ background:var(--licenciaSoft); border:1px solid var(--licenciaLine); }
  .ev .dot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .ev.actividad .dot{ background:var(--actividad); }
  .ev.work .dot{ background:var(--turno); }
  .ev.licencia .dot{ background:var(--licencia); }
  .ev .t{ font-size:14.5px; font-weight:600; }
  .ev .s{ font-size:12px; color:var(--muted); margin-top:1px; }
  .ev .time{ margin-left:auto; font-size:12.5px; font-weight:700; color:#5a6068; }

  /* week list */
  .wk-day{ border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:12px; }
  .wk-day.today{ border-color:var(--turnoLine); box-shadow:0 0 0 3px var(--turnoSoft); }
  .wk-top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
  .wk-top .d{ font-size:15px; font-weight:800; text-transform:uppercase; letter-spacing:.02em; }
  .wk-top .num{ font-size:12.5px; color:var(--muted); font-weight:600; }
  .wk-chip{ display:inline-flex; align-items:center; gap:8px; background:var(--turnoSoft);
    border:1px solid var(--turnoLine); border-radius:10px; padding:9px 11px; font-size:13.5px;
    font-weight:600; color:#3a4047; margin-bottom:7px; }
  .wk-chip .h{ color:var(--turno); font-weight:800; }
  .wk-chip.lic{ background:var(--licenciaSoft); border-color:var(--licenciaLine); }
  .wk-chip.lic .h{ color:var(--licencia); }
  .wk-chip.off{ background:var(--card); border-color:var(--line); color:var(--muted); font-weight:500; }
  .wk-ev{ display:flex; align-items:center; gap:8px; font-size:13.5px; color:#4b525a; padding:7px 2px; }
  .wk-ev .dot{ width:7px; height:7px; border-radius:50%; background:var(--actividad); }

  /* month grid */
  .cal-week{ display:grid; grid-template-columns:repeat(7,1fr); }
  .cal-dow{ font-size:11px; font-weight:700; color:var(--muted2); text-align:center; padding:6px 0; text-transform:lowercase; }
  .cal-cell{ aspect-ratio:1/1.08; border-top:1px solid var(--line); border-right:1px solid var(--line);
    padding:6px 0 0 7px; position:relative; }
  .cal-cell:nth-child(7n){ border-right:0; }
  .cal-cell .n{ font-size:13px; font-weight:600; }
  .cal-cell.out .n{ color:#c3c8cd; }
  .cal-cell.today{ background:var(--turnoSoft); }
  .cal-cell.today .n{ color:var(--turno); font-weight:800; }
  .cal-marks{ position:absolute; left:7px; bottom:6px; display:flex; gap:3px; align-items:center; }
  .cal-marks .wk{ width:14px; height:4px; border-radius:99px; background:var(--turno); opacity:.9; }
  .cal-marks .lic{ width:14px; height:4px; border-radius:99px; background:var(--licencia); opacity:.9; }
  .cal-marks .pe{ width:5px; height:5px; border-radius:50%; background:var(--actividad); }
  .cal-legend{ display:flex; flex-wrap:wrap; gap:14px; padding:14px 4px 0; font-size:12px; color:var(--muted); }
  .cal-legend span{ display:flex; align-items:center; gap:6px; }
  .cal-legend .wk{ width:14px; height:4px; border-radius:99px; background:var(--turno); }
  .cal-legend .lic{ width:14px; height:4px; border-radius:99px; background:var(--licencia); }
  .cal-legend .pe{ width:7px; height:7px; border-radius:50%; background:var(--actividad); }

  /* placeholder tabs */
  .placeholder{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:8px; color:var(--muted); padding:40px; }
  .placeholder .ic{ width:78px; height:78px; border-radius:22px; background:var(--panel);
    color:var(--muted2); display:flex; align-items:center; justify-content:center; }
  .placeholder .t{ font-size:16px; font-weight:700; color:#4b525a; }

  /* ---------- floating navbar (pill) ---------- */
  .navwrap{ position:absolute; left:0; right:0; bottom:0; padding:0 14px 8px; z-index:30; pointer-events:none; }
  .navpill{ pointer-events:auto; background:#fff; border-radius:26px; height:64px; display:flex;
    align-items:center; justify-content:space-around; padding:0 10px;
    box-shadow:0 8px 26px rgba(20,24,30,.16), 0 1px 0 rgba(0,0,0,.02); }
  .navbtn-tab{ position:relative; width:50px; height:50px; border:0; background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#aeb4bb; border-radius:18px; }
  .navbtn-tab.on{ color:var(--ink); }
  .navbtn-tab.on::after{ content:""; position:absolute; bottom:7px; width:5px; height:5px; border-radius:50%;
    background:var(--ink); }
  .navbtn-tab.qr{ background:var(--accent); color:#fff; width:56px; height:56px; border-radius:20px;
    box-shadow:0 8px 18px color-mix(in srgb, var(--accent) 40%, transparent); }
  .navbtn-tab.qr::after{ display:none; }
  .navbtn-tab.qr:active{ filter:brightness(.95); }
  .sysbar{ height:28px; background:#0e1116; display:flex; align-items:center; justify-content:center; }
  .sysbar .pill{ width:128px; height:5px; border-radius:99px; background:#3a4049; }

  /* ---------- fichaje: menu sheet ---------- */
  .ov{ position:absolute; inset:0; z-index:50; display:none; }
  .ov.show{ display:block; }
  .ov-back{ position:absolute; inset:0; background:rgba(17,21,27,.5); opacity:0; transition:.24s; }
  .ov.show .ov-back{ opacity:1; }

  .sheet{ position:absolute; left:0; right:0; bottom:0; background:#fff; border-radius:24px 24px 0 0;
    transform:translateY(100%); transition:transform .3s cubic-bezier(.22,.61,.36,1);
    padding:8px 18px calc(20px + env(safe-area-inset-bottom)); }
  .ov.show .sheet{ transform:translateY(0); }
  .grab{ width:42px; height:5px; border-radius:99px; background:#d3d7dd; margin:8px auto 14px; }
  .sheet h3{ font-size:19px; font-weight:800; margin:0 2px 4px; }
  .sheet .ctx{ display:flex; align-items:center; gap:8px; font-size:13px; color:#4b525a;
    background:var(--card); border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin:8px 2px 16px; }
  .sheet .ctx svg{ color:var(--accent); flex:0 0 auto; }
  .sheet .ctx b{ font-weight:700; color:var(--ink); }
  .opt{ display:flex; align-items:center; gap:14px; width:100%; border:1px solid var(--line);
    background:#fff; border-radius:16px; padding:15px; margin-bottom:11px; cursor:pointer; text-align:left; font:inherit; }
  .opt:active{ background:var(--card); }
  .opt .oico{ width:48px; height:48px; border-radius:14px; flex:0 0 auto; display:flex;
    align-items:center; justify-content:center; }
  .opt.in .oico{ background:var(--accentSoft); color:var(--accent); }
  .opt.out .oico{ background:#fdecea; color:var(--red); }
  .opt .ot{ flex:1; }
  .opt .ot .t{ font-size:16.5px; font-weight:700; }
  .opt .ot .s{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .opt .chev{ color:#c3c8cd; }

  /* ---------- scanner ---------- */
  .scan{ position:absolute; inset:0; background:#0d0f13; z-index:55; display:none; flex-direction:column;
    color:#fff; }
  .scan.show{ display:flex; }
  .scan-cam{ position:absolute; inset:0; background:
    radial-gradient(120% 80% at 50% 30%, #2a3038 0%, #15181d 60%, #0a0c0f 100%); }
  .scan-top{ position:relative; z-index:2; display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; }
  .scan-top .x{ width:42px; height:42px; border-radius:50%; background:rgba(255,255,255,.14); border:0;
    color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .scan-top .mode{ font-size:13.5px; font-weight:700; background:rgba(255,255,255,.14); padding:8px 14px;
    border-radius:999px; display:flex; align-items:center; gap:8px; }
  .scan-top .mode .d{ width:8px; height:8px; border-radius:50%; }
  .scan-mid{ position:relative; z-index:2; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; }
  .finder{ width:236px; height:236px; position:relative; }
  .finder .corner{ position:absolute; width:42px; height:42px; border:4px solid #fff; border-radius:6px; }
  .finder .c1{ top:0; left:0; border-right:0; border-bottom:0; }
  .finder .c2{ top:0; right:0; border-left:0; border-bottom:0; }
  .finder .c3{ bottom:0; left:0; border-right:0; border-top:0; }
  .finder .c4{ bottom:0; right:0; border-left:0; border-top:0; }
  .finder .line{ position:absolute; left:8px; right:8px; height:3px; border-radius:99px;
    background:linear-gradient(90deg, transparent, #fff, transparent);
    box-shadow:0 0 14px rgba(255,255,255,.7); top:14px; animation:scanmove 2s ease-in-out infinite; }
  @keyframes scanmove{ 0%{top:14px;} 50%{top:218px;} 100%{top:14px;} }
  .scan-hint{ font-size:15px; color:rgba(255,255,255,.86); text-align:center; max-width:240px; }
  .scan-bottom{ position:relative; z-index:2; padding:0 24px calc(28px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:12px; }
  .scan-sim{ border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.08); color:#fff;
    border-radius:13px; padding:14px; font:inherit; font-weight:700; font-size:15px; cursor:pointer; }
  .scan-sim:active{ background:rgba(255,255,255,.16); }

  /* ---------- confirmation ---------- */
  .confirm{ position:absolute; inset:0; background:#fff; z-index:60; display:none;
    flex-direction:column; align-items:center; padding:0 26px; }
  .confirm.show{ display:flex; }
  .confirm .spacer{ flex:1; }
  .confirm .badge{ width:104px; height:104px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; margin-bottom:22px; animation:pop .4s cubic-bezier(.18,.89,.32,1.28); }
  .confirm.in .badge{ background:var(--accentSoft); color:var(--accent); }
  .confirm.out .badge{ background:#eafaf0; color:var(--green); }
  @keyframes pop{ 0%{transform:scale(.4); opacity:0;} 100%{transform:scale(1); opacity:1;} }
  .confirm .ch1{ font-size:24px; font-weight:800; letter-spacing:-.01em; }
  .confirm .ch2{ font-size:14.5px; color:var(--muted); margin-top:6px; text-align:center; }
  .confirm .bigtime{ font-size:54px; font-weight:800; letter-spacing:-.03em; margin:18px 0 4px; }
  .confirm .recap{ width:100%; border:1px solid var(--line); border-radius:16px; margin-top:22px; overflow:hidden; }
  .confirm .rr{ display:flex; align-items:center; justify-content:space-between; padding:13px 15px; font-size:14px; }
  .confirm .rr + .rr{ border-top:1px solid var(--line); }
  .confirm .rr .k{ color:var(--muted); }
  .confirm .rr .v{ font-weight:700; }
  .confirm .done{ width:100%; border:0; background:var(--accent); color:var(--accentInk); border-radius:14px;
    padding:16px; font:inherit; font-weight:700; font-size:16.5px; cursor:pointer;
    margin:0 0 calc(26px + env(safe-area-inset-bottom)); margin-top:auto; }
  .confirm .done.green{ background:var(--green); }

  /* toast */
  .toast{ position:absolute; left:50%; bottom:96px; transform:translateX(-50%) translateY(14px);
    background:#22262b; color:#fff; font-size:13.5px; font-weight:600; padding:11px 17px; border-radius:999px;
    opacity:0; pointer-events:none; transition:.25s; z-index:70; white-space:nowrap; display:flex; align-items:center; gap:9px; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast .dot{ width:8px; height:8px; border-radius:50%; background:#5fd08a; }
</style>
</head>
<body>
  <div class="demo-hint">App del empleado · tocá el botón <b>QR</b> de la barra para marcar entrada/salida. La <b>Agenda</b> muestra el turno asignado.</div>
  <div id="root"></div>
  <div class="demo-hint">Panel de administración → <a class="xlink" href="Panel Horarios - Admin Movil.html">Abrir panel de horarios</a></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="fichaje-icons.jsx"></script>
  <script type="text/babel" src="fichaje-agenda.jsx"></script>
  <script type="text/babel" src="fichaje-app.jsx"></script>
</body>
</html>
