<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gestión de Encuestas — Rediseño</title>
<style>
  :root{
    --ink:#1c2024; --muted:#7a8087; --muted2:#9aa3ab; --line:#e8eaed;
    --card:#f6f7f9; --panel:#eef0f2; --blue:#2f78e8; --blueBtn:#2f78e8;
    --navy:#2b1f5c; --green:#1f9d57; --red:#e2543b; --amber:#c98a1a;
    --accent:#2f78e8; --accentSoft:#e9f1fd; --accentLine:#cfe0f9;
    --avatarBg:#cfe0f7; --avatarInk:#3b6fd4;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{ font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:#dfe2e6; color:var(--ink); display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:22px 12px 40px; gap:14px; }
  .demo-hint{ font-size:12px; color:#5d636b; max-width:392px; text-align:center; line-height:1.5; }
  .demo-hint b{ color:#33373c; }

  /* ---------- phone ---------- */
  .phone{ width:392px; max-width:100%; height:812px; background:#fff; border-radius:30px; position:relative;
    overflow:hidden; box-shadow:0 18px 50px rgba(20,24,30,.28), 0 0 0 9px #11151b, 0 0 0 10px #2a2f37; }
  .statusbar{ height:34px; display:flex; align-items:center; justify-content:space-between; padding:0 22px;
    font-size:13px; font-weight:600; color:#22262b; background:#fff; position:relative; z-index:5; }
  .sb-right{ display:flex; align-items:center; gap:6px; }
  .sb-right .bar{ width:3px; border-radius:1px; background:#22262b; }
  .sb-batt{ font-size:10px; background:#22262b; color:#fff; border-radius:5px; padding:1px 5px; font-weight:700; }

  .stage{ position:absolute; inset:34px 0 0; display:flex; flex-direction:column; overflow:hidden; background:#fff; }

  /* ---------- app header ---------- */
  .apphead{ flex:0 0 auto; padding:10px 16px 12px; border-bottom:1px solid var(--line); position:relative;
    display:flex; align-items:center; justify-content:center; }
  .apphead .back{ position:absolute; left:14px; top:50%; transform:translateY(-50%); border:0;
    background:transparent; color:var(--blue); cursor:pointer; display:flex; align-items:center; padding:6px; }
  .apphead .ttl{ font-size:18px; font-weight:700; color:var(--blue); letter-spacing:-.01em; }
  .apphead .trash{ position:absolute; right:14px; top:50%; transform:translateY(-50%); border:0;
    background:transparent; color:var(--red); cursor:pointer; display:flex; align-items:center; padding:6px; }
  .apphead .lresult{ position:absolute; left:14px; top:50%; transform:translateY(-50%); border:0;
    background:transparent; color:var(--blue); cursor:pointer; font:inherit; font-weight:600; font-size:14.5px; padding:6px; }

  .body{ flex:1 1 auto; overflow-y:auto; padding:18px 16px 120px; }
  .body::-webkit-scrollbar{ width:0; }
  .scr-title{ font-size:23px; font-weight:800; letter-spacing:-.02em; text-align:center; margin:2px 0 18px; }

  /* ---------- generic card ---------- */
  .card{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:20px 16px;
    box-shadow:0 1px 2px rgba(20,24,30,.04); margin-bottom:16px; }
  .card.tight{ padding:16px; }

  /* ---------- form fields (more breathing room) ---------- */
  .field{ margin-bottom:22px; }
  .field:last-child{ margin-bottom:0; }
  .field .lab{ display:block; font-size:13px; font-weight:700; color:var(--ink); margin:0 2px 9px; }
  .field .lab .req{ color:var(--red); }
  .field .hint{ font-size:12px; color:var(--muted); margin:7px 2px 0; }
  .inp{ width:100%; border:1px solid var(--line); background:var(--card); border-radius:12px;
    padding:14px 14px; font:inherit; font-size:15.5px; color:var(--ink); outline:none; transition:.16s; }
  .inp::placeholder{ color:var(--muted2); }
  .inp:focus{ border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accentSoft); }
  textarea.inp{ resize:none; min-height:84px; line-height:1.45; }
  .inp.calendar{ display:flex; align-items:center; justify-content:space-between; color:var(--muted2);
    cursor:pointer; gap:10px; }
  .inp.calendar.set{ color:var(--ink); }
  .inp.calendar svg{ color:var(--muted); flex:0 0 auto; }

  /* switch row */
  .switchrow{ display:flex; align-items:center; justify-content:space-between; gap:14px; }
  .switchrow .sw-t{ font-size:15px; font-weight:700; }
  .switchrow .sw-s{ font-size:12.5px; color:var(--muted); margin-top:2px; max-width:230px; }
  .switch{ flex:0 0 auto; width:50px; height:30px; border-radius:999px; background:#c4cad1; border:0; position:relative;
    cursor:pointer; transition:background .2s; }
  .switch .knob{ position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff;
    transition:transform .2s; box-shadow:0 1px 3px rgba(0,0,0,.25); }
  .switch.on{ background:var(--accent); }
  .switch.on .knob{ transform:translateX(20px); }

  /* section label inside card */
  .seclab{ font-size:16px; font-weight:800; letter-spacing:-.01em; }
  .card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .card-head .cnt{ font-size:13px; color:var(--muted); font-weight:600; }

  /* ---------- audience block ---------- */
  .aud-quick{ display:flex; align-items:center; gap:12px; padding:14px; border:1.5px solid var(--line);
    border-radius:13px; cursor:pointer; transition:.16s; background:#fff; }
  .aud-quick.on{ border-color:var(--accent); background:var(--accentSoft); }
  .aud-quick .radio{ width:22px; height:22px; border-radius:50%; border:2px solid #c4cad1; flex:0 0 auto;
    display:flex; align-items:center; justify-content:center; transition:.16s; }
  .aud-quick.on .radio{ border-color:var(--accent); }
  .aud-quick.on .radio::after{ content:""; width:11px; height:11px; border-radius:50%; background:var(--accent); }
  .aud-quick .qt{ flex:1; }
  .aud-quick .qt .a{ font-size:15px; font-weight:700; }
  .aud-quick .qt .b{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .aud-divider{ display:flex; align-items:center; gap:12px; margin:14px 2px; color:var(--muted2);
    font-size:12px; font-weight:600; letter-spacing:.04em; }
  .aud-divider::before,.aud-divider::after{ content:""; height:1px; background:var(--line); flex:1; }

  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .chip{ display:inline-flex; align-items:center; gap:8px; background:var(--accentSoft); border:1px solid var(--accentLine);
    color:#2a4f86; border-radius:999px; padding:6px 8px 6px 6px; font-size:13px; font-weight:600; }
  .chip .av{ width:22px; height:22px; border-radius:50%; background:var(--avatarBg); color:var(--avatarInk);
    display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex:0 0 auto; }
  .chip .x{ border:0; background:transparent; color:#5e7aa6; cursor:pointer; display:flex; padding:0; }
  .chip.more{ background:var(--panel); border-color:var(--line); color:#5a6068; padding:7px 12px; }

  .pick-btn{ width:100%; display:flex; align-items:center; justify-content:center; gap:9px;
    border:1.5px dashed #c4cad1; background:#fcfcfd; color:var(--accent); border-radius:13px; padding:14px;
    font:inherit; font-weight:700; font-size:14.5px; cursor:pointer; transition:.16s; }
  .pick-btn:active{ background:var(--accentSoft); }
  .aud-summary{ font-size:13px; color:var(--muted); margin-top:11px; text-align:center; }
  .aud-summary b{ color:var(--ink); }

  /* questions preview */
  .qrow{ display:flex; align-items:center; gap:12px; padding:13px 0; border-top:1px solid var(--line); }
  .qrow:first-of-type{ border-top:0; }
  .qrow .qnum{ width:30px; height:30px; border-radius:9px; background:var(--accentSoft); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; flex:0 0 auto; }
  .qrow .qmid{ flex:1; min-width:0; }
  .qrow .qmid .qt{ font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .qrow .qmid .qty{ font-size:12px; color:var(--muted); margin-top:1px; }
  .addq{ border:0; background:var(--accent); color:#fff; border-radius:11px; padding:9px 14px;
    font:inherit; font-weight:700; font-size:13.5px; cursor:pointer; }
  .empty-q{ text-align:center; color:var(--muted); font-size:13.5px; padding:18px 0 4px; }

  /* ---------- bottom action bar ---------- */
  .actionbar{ position:absolute; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 16px calc(14px + env(safe-area-inset-bottom)); display:flex; align-items:center; gap:11px; z-index:15; }
  .actionbar .ghost{ border:1.5px solid var(--line); background:#fff; color:#5a6068; border-radius:13px;
    padding:14px 22px; font:inherit; font-weight:700; font-size:15px; cursor:pointer; }
  .actionbar .primary{ flex:1; border:0; background:var(--accent); color:#fff; border-radius:13px; padding:14px;
    font:inherit; font-weight:700; font-size:15.5px; cursor:pointer; display:flex; align-items:center;
    justify-content:center; gap:9px; }
  .actionbar .primary:disabled{ background:#aebfe8; }
  .actionbar .primary .badge{ background:rgba(255,255,255,.25); border-radius:999px; padding:1px 9px; font-size:13px; }

  /* ---------- survey list ---------- */
  .search{ display:flex; align-items:center; gap:9px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:12px 13px; margin-bottom:16px; }
  .search input{ border:0; background:transparent; outline:none; font:inherit; font-size:15px; flex:1; color:var(--ink); }
  .search svg{ color:#9aa3ab; flex:0 0 auto; }
  .scard{ display:flex; align-items:center; gap:13px; background:#fff; border:1px solid var(--line);
    border-radius:14px; padding:15px 14px; margin-bottom:11px; cursor:pointer; transition:.15s; text-align:left;
    width:100%; font:inherit; }
  .scard:active{ background:var(--card); }
  .scard .smid{ flex:1; min-width:0; }
  .scard .smid .snm{ font-size:15.5px; font-weight:700; }
  .scard .smid .smeta{ font-size:12.5px; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:7px; }
  .pill{ font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; }
  .pill.active{ color:var(--green); background:#eafaf0; border:1px solid #c8ecd6; }
  .pill.closed{ color:#5a6068; background:var(--panel); border:1px solid var(--line); }
  .scard .chev{ color:#c9ced4; flex:0 0 auto; }

  /* ---------- results ---------- */
  .res-desc{ font-size:14px; color:var(--muted); text-align:center; line-height:1.45; margin:-6px 0 18px; }
  .statrow{ display:flex; gap:11px; margin-bottom:16px; }
  .stat{ flex:1; background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 12px; text-align:center; }
  .stat .n{ font-size:24px; font-weight:800; letter-spacing:-.02em; }
  .stat .l{ font-size:11.5px; color:var(--muted); margin-top:3px; font-weight:600; }
  .stat .n.accent{ color:var(--accent); }

  .qhead{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:4px; }
  .qhead .qlabel{ font-size:13px; font-weight:700; color:var(--accent); }
  .qtype{ display:inline-flex; align-items:center; gap:5px; font-size:12.5px; color:var(--muted); font-weight:600; }
  .qtitle{ font-size:17px; font-weight:800; letter-spacing:-.01em; margin:5px 0 16px; }

  .bar{ margin-bottom:13px; }
  .bar:last-child{ margin-bottom:0; }
  .bar .bt{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .bar .bt .bl{ font-size:14.5px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .bar .bt .bl .clock{ color:var(--accent); display:flex; }
  .bar .bt .bv{ font-size:13px; color:var(--muted); font-weight:600; font-variant-numeric:tabular-nums; }
  .bar .track{ height:10px; border-radius:99px; background:var(--panel); overflow:hidden; }
  .bar .fill{ height:100%; border-radius:99px; background:var(--accent); transition:width .5s cubic-bezier(.22,.61,.36,1); }

  /* voters block */
  .voters-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .selectall{ display:inline-flex; align-items:center; gap:8px; border:0; background:transparent; cursor:pointer;
    font:inherit; font-weight:700; font-size:13.5px; color:var(--accent); padding:4px 2px; }
  .vrow{ display:flex; align-items:center; gap:12px; padding:11px 8px; border-radius:12px; cursor:pointer;
    transition:background .14s; }
  .vrow:hover{ background:var(--card); }
  .vrow.sel{ background:var(--accentSoft); }
  .check{ width:23px; height:23px; border-radius:7px; border:2px solid #c4cad1; flex:0 0 auto; background:#fff;
    display:flex; align-items:center; justify-content:center; color:#fff; transition:.14s; }
  .vrow.sel .check{ background:var(--accent); border-color:var(--accent); }
  .avatar{ flex:0 0 auto; width:40px; height:40px; border-radius:50%; background:var(--avatarBg); color:var(--avatarInk);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
  .avatar.sm{ width:32px; height:32px; font-size:12.5px; }
  .vrow .vmid{ flex:1; min-width:0; }
  .vrow .vmid .vn{ font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .vrow .vmid .vr{ font-size:12px; color:var(--muted); margin-top:1px; }
  .slot{ flex:0 0 auto; display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:700;
    color:#2a4f86; background:var(--accentSoft); border:1px solid var(--accentLine); border-radius:999px; padding:5px 11px; }
  .slot svg{ opacity:.8; }
  .anon-note{ display:flex; align-items:center; gap:9px; font-size:12.5px; color:#3a4658; background:var(--accentSoft);
    border:1px solid var(--accentLine); border-radius:11px; padding:11px 13px; }
  .anon-note svg{ color:var(--accent); flex:0 0 auto; }

  /* ---------- bottom sheet ---------- */
  .ov{ position:absolute; inset:0; z-index:50; display:none; }
  .ov.show{ display:block; }
  .ov-back{ position:absolute; inset:0; background:rgba(17,21,27,.5); opacity:0; transition:.24s; }
  .ov.show .ov-back{ opacity:1; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; background:#fff; border-radius:24px 24px 0 0;
    transform:translateY(100%); transition:transform .3s cubic-bezier(.22,.61,.36,1);
    max-height:90%; display:flex; flex-direction:column; }
  .ov.show .sheet{ transform:translateY(0); }
  .grab{ width:42px; height:5px; border-radius:99px; background:#d3d7dd; margin:9px auto 6px; flex:0 0 auto; }
  .sheet-head{ padding:6px 18px 12px; flex:0 0 auto; }
  .sheet-head .t{ font-size:19px; font-weight:800; letter-spacing:-.01em; }
  .sheet-head .s{ font-size:13px; color:var(--muted); margin-top:3px; }
  .sheet-search{ margin:0 16px 8px; flex:0 0 auto; display:flex; align-items:center; gap:9px;
    background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 13px; }
  .sheet-search input{ flex:1; border:0; background:transparent; outline:none; font:inherit; font-size:15px; }
  .sheet-search svg{ color:#9aa3ab; flex:0 0 auto; }
  .sheet-scroll{ overflow-y:auto; padding:2px 10px 6px; flex:1 1 auto; }
  .sheet-scroll::-webkit-scrollbar{ width:6px; }
  .sheet-scroll::-webkit-scrollbar-thumb{ background:#cdd2d8; border-radius:99px; }

  .grouphead{ display:flex; align-items:center; justify-content:space-between; padding:12px 8px 6px; }
  .grouphead .gt{ font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
  .grouphead .gsel{ border:0; background:transparent; color:var(--accent); font:inherit; font-weight:700;
    font-size:12.5px; cursor:pointer; padding:2px 4px; }
  .arow{ display:flex; align-items:center; gap:12px; padding:10px 8px; border-radius:11px; cursor:pointer; }
  .arow:hover{ background:#eef1f4; }
  .arow.sel{ background:var(--accentSoft); }
  .arow .nm{ flex:1; font-size:15px; font-weight:600; }
  .sheet-empty{ text-align:center; color:var(--muted); font-size:14px; padding:26px 0; }

  .sheet-foot{ flex:0 0 auto; padding:12px 16px calc(16px + env(safe-area-inset-bottom)); border-top:1px solid var(--line);
    display:flex; align-items:center; gap:11px; }
  .sheet-foot .meta{ flex:1; font-size:13px; color:var(--muted); }
  .sheet-foot .meta b{ color:var(--ink); }
  .sheet-foot .confirm{ border:0; background:var(--accent); color:#fff; border-radius:13px; padding:14px 22px;
    font:inherit; font-weight:700; font-size:15.5px; cursor:pointer; }
  .sheet-foot .confirm:disabled{ background:#aebfe8; }

  /* meeting sheet specifics */
  .mt-field{ margin:0 16px 16px; }
  .mt-field .lab{ display:block; font-size:13px; font-weight:700; margin:0 2px 8px; }
  .mt-group{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 13px; margin-bottom:11px; }
  .mt-group .gh{ display:flex; align-items:center; gap:9px; margin-bottom:10px; }
  .mt-group .gh .gslot{ display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:800; color:var(--accent); }
  .mt-group .gh .gcount{ font-size:12px; color:var(--muted); font-weight:600; margin-left:auto; }
  .mt-people{ display:flex; flex-wrap:wrap; gap:8px; }
  .mt-person{ display:inline-flex; align-items:center; gap:7px; background:#fff; border:1px solid var(--line);
    border-radius:999px; padding:4px 11px 4px 4px; font-size:13px; font-weight:600; }
  .mt-sep-note{ display:flex; align-items:flex-start; gap:9px; margin:0 16px 14px; font-size:12.5px; color:#3a4658;
    background:var(--accentSoft); border:1px solid var(--accentLine); border-radius:11px; padding:11px 13px; }
  .mt-sep-note svg{ color:var(--accent); flex:0 0 auto; margin-top:1px; }

  /* toast */
  .toast{ position:absolute; left:50%; bottom:120px; transform:translateX(-50%) translateY(14px); background:#22262b;
    color:#fff; font-size:13.5px; font-weight:600; padding:12px 18px; border-radius:14px; opacity:0; pointer-events:none;
    transition:.25s; z-index:70; max-width:330px; display:flex; align-items:center; gap:11px; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast .dot{ width:9px; height:9px; border-radius:50%; background:#5fd08a; flex:0 0 auto; }
  .toast .tt{ line-height:1.35; }

  .sysbar{ height:28px; background:#0e1116; display:flex; align-items:center; justify-content:center; }
  .sysbar .pill2{ width:128px; height:5px; border-radius:99px; background:#3a4049; }
</style>
</head>
<body>
  <div class="demo-hint">Gestión de Encuestas · <b>destinatarios</b> al crear (quién ve la encuesta) y, en el análisis, <b>seleccionar votantes</b> para enviarles una reunión en el horario que cada uno eligió.</div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="encuestas-app.jsx"></script>
</body>
</html>
