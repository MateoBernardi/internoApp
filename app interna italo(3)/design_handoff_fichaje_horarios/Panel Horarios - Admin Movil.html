<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horarios — Admin móvil</title>
<style>
  :root{
    --ink:#1c2024; --muted:#7a8087; --muted2:#9aa3ab; --line:#e8eaed;
    --card:#f6f7f9; --panel:#eef0f2; --blue:#2f78e8; --blueBtn:#5b86f0;
    --navy:#2b1f5c; --green:#1f9d57; --red:#e2543b; --amber:#c98a1a;
    --accent:#2f78e8; --accentSoft:#e9f1fd; --accentLine:#cfe0f9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{ font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:#dfe2e6; color:var(--ink); display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:22px 12px 40px; gap:14px; }
  .demo-hint{ font-size:12px; color:#5d636b; max-width:392px; text-align:center; line-height:1.5; }
  .demo-hint b{ color:#33373c; }
  a.xlink{ color:#3a6fd0; font-weight:600; text-decoration:none; }

  .phone{ width:392px; max-width:100%; height:812px; background:#fff; border-radius:30px; position:relative;
    overflow:hidden; box-shadow:0 18px 50px rgba(20,24,30,.28), 0 0 0 9px #11151b, 0 0 0 10px #2a2f37; }
  .statusbar{ height:34px; display:flex; align-items:center; justify-content:space-between; padding:0 22px;
    font-size:13px; font-weight:600; color:#22262b; background:#fff; position:relative; z-index:5; }
  .sb-right{ display:flex; align-items:center; gap:6px; }
  .sb-right .bar{ width:3px; border-radius:1px; background:#22262b; }
  .sb-batt{ font-size:10px; background:#22262b; color:#fff; border-radius:5px; padding:1px 5px; font-weight:700; }

  .stage{ position:absolute; inset:34px 0 0; display:flex; flex-direction:column; overflow:hidden; background:#fff; }
  .scr-head{ padding:14px 18px 0; flex:0 0 auto; }
  .back{ display:flex; align-items:center; gap:6px; border:0; background:transparent; color:var(--blue);
    font:inherit; font-weight:600; font-size:14px; cursor:pointer; padding:0; margin-bottom:6px; }
  .scr-title{ font-size:22px; font-weight:800; letter-spacing:-.015em; }
  .scr-sub{ font-size:13px; color:var(--muted); margin-top:2px; }
  .daynav{ display:flex; align-items:center; justify-content:space-between; margin-top:12px; }
  .daynav .lbl{ font-size:16px; font-weight:800; }
  .daynav .nb{ width:34px; height:34px; border-radius:50%; border:0; background:var(--panel); color:#5a6068;
    display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .daynav .nb:disabled{ opacity:.4; }

  /* import card */
  .imp{ display:flex; align-items:center; gap:11px; margin:14px 18px 0; padding:12px 13px;
    border:1.5px dashed #c4cad1; border-radius:14px; background:#fcfcfd; }
  .imp .ic{ width:40px; height:40px; border-radius:11px; background:var(--accentSoft); color:var(--accent);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .imp .t{ flex:1; min-width:0; }
  .imp .t .a{ font-size:14px; font-weight:700; white-space:nowrap; }
  .imp .t .b{ font-size:11.5px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .imp .go{ border:0; background:var(--accent); color:#fff; border-radius:10px; padding:9px 12px;
    font:inherit; font-weight:700; font-size:12.5px; cursor:pointer; flex:0 0 auto; }

  /* toolbar */
  .tools{ padding:14px 18px 6px; flex:0 0 auto; }
  .search{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line);
    border-radius:11px; padding:10px 12px; }
  .search input{ border:0; background:transparent; outline:none; font:inherit; font-size:14.5px; flex:1; color:var(--ink); }
  .search svg{ color:#9aa3ab; }
  .filter{ display:flex; gap:6px; margin-top:10px; }
  .filter button{ flex:1; border:0; background:var(--panel); font:inherit; font-weight:600; font-size:13px;
    color:#5a6068; padding:9px 0; border-radius:9px; cursor:pointer; }
  .filter button.on{ background:var(--navy); color:#fff; }
  /* sede filter (text + native select overlay) */
  .selfilter{ position:relative; display:flex; align-items:center; gap:6px; margin-top:8px;
    background:var(--card); border:1px solid var(--line); border-radius:11px; padding:11px 13px; }
  .selfilter .k{ font-size:13px; color:var(--muted); font-weight:600; }
  .selfilter .txt{ flex:1; font-size:14px; font-weight:600; }
  .selfilter .cv{ color:#9aa3ab; display:flex; }
  .selfilter select{ position:absolute; inset:0; width:100%; height:100%; opacity:0; border:0; cursor:pointer; }

  .list{ flex:1 1 auto; overflow-y:auto; padding:8px 18px 150px; }
  .list::-webkit-scrollbar{ width:0; }
  .dhead{ font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.04em; text-transform:uppercase;
    margin:14px 2px 8px; display:flex; align-items:center; justify-content:space-between; }
  .dhead .cnt{ color:var(--muted2); font-weight:600; }

  .pcard{ display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--line);
    border-radius:14px; padding:12px 13px; margin-bottom:9px; cursor:pointer; transition:.15s; }
  .pcard:active{ background:var(--card); }
  .pcard.isnew{ animation:cardin .4s ease; }
  @keyframes cardin{ from{ background:#eafaf0; } to{ background:#fff; } }
  .pcard .tn{ width:42px; height:42px; border-radius:12px; flex:0 0 auto; display:flex; align-items:center;
    justify-content:center; font-weight:800; font-size:15px; }
  .pcard .tn.M{ background:var(--accentSoft); color:var(--accent); }
  .pcard .tn.T{ background:#fbf1dd; color:var(--amber); }
  .pcard .mid{ flex:1; min-width:0; }
  .pcard .mid .nm{ font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pcard .mid .sb{ font-size:12.5px; color:var(--muted); margin-top:2px; display:flex; align-items:center; gap:5px; }
  .pcard .mid .sb svg{ flex:0 0 auto; }
  .pcard .rt{ text-align:right; flex:0 0 auto; }
  .pcard .rt .hr{ font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:.01em; }
  .pcard .rt .tl{ font-size:11px; color:var(--muted); margin-top:2px; }
  .pcard .chev{ color:#c9ced4; flex:0 0 auto; }
  .empty{ text-align:center; color:var(--muted); font-size:14px; padding:40px 10px; }

  /* FAB */
  .fab{ position:absolute; right:18px; bottom:104px; width:58px; height:58px; border-radius:19px; border:0;
    background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 10px 24px color-mix(in srgb, var(--accent) 40%, transparent); z-index:20; }
  .fab:active{ filter:brightness(.95); }

  /* save bar */
  .savebar{ position:absolute; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 18px calc(14px + env(safe-area-inset-bottom)); display:flex; align-items:center; gap:12px; z-index:15; }
  .savebar .info{ flex:1; font-size:12.5px; color:var(--muted); }
  .savebar .info b{ color:var(--ink); }
  .savebar .pill-dirty{ display:inline-block; font-size:11px; font-weight:700; color:var(--amber);
    background:#fdf4e3; border:1px solid #f0e0bf; padding:3px 9px; border-radius:999px; margin-top:4px; }
  .savebar .pill-saved{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700;
    color:var(--green); background:#eafaf0; border:1px solid #c8ecd6; padding:3px 9px; border-radius:999px; margin-top:4px; }
  .savebar .save{ border:0; background:var(--accent); color:#fff; border-radius:12px; padding:13px 18px;
    font:inherit; font-weight:700; font-size:14.5px; cursor:pointer; }
  .savebar .save:disabled{ background:#aebfe8; }

  /* edit sheet */
  .ov{ position:absolute; inset:0; z-index:50; display:none; }
  .ov.show{ display:block; }
  .ov-back{ position:absolute; inset:0; background:rgba(17,21,27,.5); opacity:0; transition:.24s; }
  .ov.show .ov-back{ opacity:1; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; background:#fff; border-radius:24px 24px 0 0;
    transform:translateY(100%); transition:transform .3s cubic-bezier(.22,.61,.36,1);
    padding:8px 18px calc(18px + env(safe-area-inset-bottom)); max-height:88%; overflow-y:auto; }
  .sheet::-webkit-scrollbar{ width:0; }
  .ov.show .sheet{ transform:translateY(0); }
  .grab{ width:42px; height:5px; border-radius:99px; background:#d3d7dd; margin:8px auto 12px; }
  .sheet h3{ font-size:19px; font-weight:800; margin:0 2px 16px; }
  .fld{ margin-bottom:14px; }
  .fld .lab{ font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.03em;
    text-transform:uppercase; margin:0 2px 7px; }
  .fld input{ width:100%; border:1px solid var(--line); background:var(--card); border-radius:12px;
    padding:13px 13px; font:inherit; font-size:15.5px; color:var(--ink); outline:none; }
  .fld input:focus{ border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accentSoft); }
  .row2{ display:flex; gap:11px; }
  .row2 .fld{ flex:1; }
  .seg2{ display:flex; gap:8px; }
  .seg2 button{ flex:1; border:1.5px solid var(--line); background:#fff; border-radius:12px; padding:13px 0;
    font:inherit; font-weight:700; font-size:14.5px; color:#5a6068; cursor:pointer; }
  .seg2 button.on{ border-color:var(--accent); color:var(--accent); background:var(--accentSoft); }
  .selwrap{ position:relative; display:flex; align-items:center; border:1px solid var(--line); background:var(--card);
    border-radius:12px; padding:13px 13px; }
  .selwrap .txt{ flex:1; font-size:15.5px; }
  .selwrap .cv{ color:#9aa3ab; display:flex; }
  .selwrap select{ position:absolute; inset:0; width:100%; height:100%; opacity:0; border:0; cursor:pointer; }
  .sheet .acts{ display:flex; gap:11px; margin-top:8px; }
  .sheet .del{ border:1.5px solid #f0c7bf; background:#fff; color:var(--red); border-radius:13px; padding:15px 18px;
    font:inherit; font-weight:700; font-size:15px; cursor:pointer; }
  .sheet .ok{ flex:1; border:0; background:var(--accent); color:#fff; border-radius:13px; padding:15px;
    font:inherit; font-weight:700; font-size:16px; cursor:pointer; }
  .syncnote{ display:flex; align-items:center; gap:8px; font-size:12px; color:#3a4658; background:var(--accentSoft);
    border:1px solid var(--accentLine); border-radius:10px; padding:10px 12px; margin-bottom:16px; }
  .syncnote svg{ color:var(--accent); flex:0 0 auto; }

  .toast{ position:absolute; left:50%; bottom:120px; transform:translateX(-50%) translateY(14px); background:#22262b;
    color:#fff; font-size:13px; font-weight:600; padding:11px 16px; border-radius:999px; opacity:0; pointer-events:none;
    transition:.25s; z-index:70; white-space:nowrap; display:flex; align-items:center; gap:9px; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast .dot{ width:8px; height:8px; border-radius:50%; background:#5fd08a; }

  .sysbar{ height:28px; background:#0e1116; display:flex; align-items:center; justify-content:center; }
  .sysbar .pill{ width:128px; height:5px; border-radius:99px; background:#3a4049; }

  /* ---------- horarios home menu ---------- */
  .menu{ padding:16px 18px 0; }
  .mcard{ display:flex; align-items:center; gap:14px; background:#fff; border:1px solid var(--line);
    border-radius:16px; padding:16px; margin-bottom:12px; cursor:pointer; transition:.15s; }
  .mcard:active{ background:var(--card); }
  .mic{ width:46px; height:46px; border-radius:13px; background:var(--accentSoft); color:var(--accent);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .mmid{ flex:1; min-width:0; }
  .mmid .mt{ font-size:15.5px; font-weight:700; }
  .mmid .mb{ font-size:12.5px; color:var(--muted); margin-top:3px; line-height:1.4; }

  /* ---------- horas extra: range box ---------- */
  .he-rangebox{ margin-top:12px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; }
  .he-presets{ display:flex; gap:8px; margin-bottom:10px; }
  .he-presets button{ flex:1; border:0; background:var(--panel); font:inherit; font-weight:600; font-size:12.5px;
    color:#5a6068; padding:8px 0; border-radius:9px; cursor:pointer; }
  .he-presets button.on{ background:var(--navy); color:#fff; }
  .he-rangedates{ display:flex; gap:10px; }
  .he-rangedates label{ flex:1; display:flex; flex-direction:column; gap:4px; }
  .he-rangedates label span{ font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; }
  .he-rangedates input[type="date"]{ border:1px solid var(--line); background:#fff; border-radius:9px; padding:8px 8px;
    font:inherit; font-size:13px; color:var(--ink); outline:none; width:100%; }
  .he-rangedates input[type="date"]:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accentSoft); }

  /* ---------- horas extra: employee list ---------- */
  .ecard{ display:flex; align-items:center; gap:11px; background:#fff; border:1px solid var(--line);
    border-radius:14px; padding:12px 13px; margin-bottom:9px; cursor:pointer; transition:.15s; }
  .ecard:active{ background:var(--card); }
  .eav{ width:40px; height:40px; border-radius:50%; background:var(--accentSoft); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13.5px; flex:0 0 auto; }
  .emid{ flex:1; min-width:0; }
  .emid .enm{ font-size:14.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .emid .erole{ font-size:12px; color:var(--muted); margin-top:2px; }
  .ert{ text-align:right; flex:0 0 auto; }
  .ert .ehr{ font-size:15px; font-weight:800; color:var(--amber); font-variant-numeric:tabular-nums; }
  .ert .etl{ font-size:10.5px; color:var(--muted); margin-top:1px; }
  .eliq{ display:flex; align-items:center; gap:5px; flex:0 0 auto; border:1.5px solid var(--accentLine);
    background:var(--accentSoft); color:var(--accent); border-radius:10px; padding:8px 10px; font:inherit;
    font-weight:700; font-size:12px; cursor:pointer; }
  .eliq:active{ filter:brightness(.97); }

  /* ---------- horas extra: detail sheet ---------- */
  .he-detail-role{ font-size:13px; color:var(--muted); font-weight:600; margin:0 2px 14px; }
  .he-total-box{ background:var(--accentSoft); border:1px solid var(--accentLine); border-radius:14px;
    padding:14px 16px; text-align:center; margin-bottom:16px; }
  .he-total-n{ font-size:26px; font-weight:800; letter-spacing:-.02em; color:var(--accent); }
  .he-total-l{ font-size:12.5px; color:#3a4658; margin-top:2px; font-weight:600; }
  .he-daylist-head{ font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.04em;
    text-transform:uppercase; margin:0 2px 8px; }
  .he-daylist{ margin-bottom:6px; }
  .he-dayrow{ display:flex; align-items:center; justify-content:space-between; padding:10px 2px;
    border-top:1px solid var(--line); }
  .he-dayrow:first-child{ border-top:0; }
  .he-dn{ font-size:14px; font-weight:600; }
  .he-dn .he-dd{ color:var(--muted); font-weight:500; margin-left:4px; }
  .he-dh{ font-size:14px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--ink); }
  .he-dh.zero{ color:var(--muted2); font-weight:600; }
</style>
</head>
<body>
  <div class="demo-hint">Admin desde el celular · una sola pantalla, <b>un día a la vez</b>. Filtros por turno, sede y empleado. Los turnos se cargan desde un <b>TXT</b>.</div>
  <div id="root"></div>
  <div class="demo-hint">App del empleado → <a class="xlink" href="Fichaje - App Empleado.html">Ver agenda personal</a></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="horas-extras.jsx"></script>
  <script type="text/babel" src="admin-movil.jsx"></script>
</body>
</html>
