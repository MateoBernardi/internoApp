<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Participantes — Rediseño</title>
<style>
  :root{
    --ink:#1c2024;
    --muted:#7a8087;
    --muted2:#9aa3ab;
    --line:#e8eaed;
    --card:#f6f7f9;
    --panel:#eef0f2;
    --bubble:#ededf0;
    --blue:#2f78e8;
    --send:#5b9bf0;
    --avatarBg:#cfe0f7;
    --avatarInk:#3b6fd4;
    --navy:#2b1f5c;
    --xbg:#9aa3ab;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:#dfe2e6;
    color:var(--ink);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%;
    padding:22px 12px 40px;
    gap:14px;
  }

  /* ---- demo toggle ---- */
  .demo-toggle{
    display:inline-flex; background:#cfd3d9; border-radius:999px; padding:4px;
    gap:4px; box-shadow:inset 0 1px 2px rgba(0,0,0,.08);
    font-size:13px; user-select:none;
  }
  .demo-toggle button{
    border:0; background:transparent; padding:8px 16px; border-radius:999px;
    font:inherit; font-weight:600; color:#5a6068; cursor:pointer; transition:.18s;
  }
  .demo-toggle button.on{ background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.14); }
  .demo-hint{ font-size:12px; color:#5d636b; max-width:380px; text-align:center; line-height:1.5; }
  .demo-hint b{ color:#33373c; }

  /* ---- phone ---- */
  .phone{
    width:392px; max-width:100%; height:812px;
    background:#fff; border-radius:30px; position:relative; overflow:hidden;
    box-shadow:0 18px 50px rgba(20,24,30,.28), 0 0 0 9px #11151b, 0 0 0 10px #2a2f37;
  }
  .statusbar{
    height:34px; display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; font-size:13px; font-weight:600; color:#22262b; background:#eef0f2;
  }
  .statusbar .sb-right{ display:flex; align-items:center; gap:6px; }
  .sb-right .bar{ width:3px; border-radius:1px; background:#22262b; }
  .sb-batt{ font-size:10px; background:#22262b; color:#fff; border-radius:5px; padding:1px 5px; font-weight:700; }

  /* backdrop + modal */
  .screen{ position:absolute; inset:34px 0 0; background:#7d8186; overflow:hidden; }
  .modal{
    position:absolute; left:0; right:0; bottom:0; top:46px;
    background:#fff; border-radius:22px 22px 0 0;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .modal-grab{
    height:54px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:flex-end; padding:0 18px;
    flex:0 0 auto;
  }
  .chev{
    width:42px; height:42px; border-radius:50%; background:#eef0f2; border:0;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:#8a9097;
  }
  .modal-body{ flex:1 1 auto; overflow-y:auto; padding:18px 18px 0; }
  .modal-body::-webkit-scrollbar{ width:0; }

  .summary{ font-size:14.5px; color:var(--muted); line-height:1.45; margin:2px 0 18px; }
  .summary .more{ color:#5a6068; font-weight:600; }

  /* section header */
  .sec-head{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
  }
  .sec-head .label{ font-size:16px; color:var(--muted); font-weight:500; }
  .sec-head .actions{ display:flex; align-items:center; gap:14px; }
  .iconbtn{
    width:30px; height:30px; border-radius:50%; border:1.6px solid var(--navy);
    display:flex; align-items:center; justify-content:center; color:var(--navy);
    background:#fff; cursor:pointer; font-size:14px; font-weight:700;
  }
  .agregar{
    display:inline-flex; align-items:center; gap:7px; border:1.6px solid var(--navy);
    color:var(--navy); background:#fff; border-radius:999px; padding:9px 16px;
    font-size:14.5px; font-weight:700; cursor:pointer;
  }
  .agregar .plus{ font-size:18px; line-height:1; margin-top:-1px; }

  /* ---- legacy stacked cards ---- */
  .legacy-card{
    display:flex; align-items:center; gap:14px; background:var(--card);
    border:1px solid var(--line); border-radius:14px; padding:14px 14px; margin-bottom:12px;
  }
  .legacy-card .name{ flex:1; font-size:17px; font-weight:700; }

  .avatar{
    flex:0 0 auto; width:46px; height:46px; border-radius:50%;
    background:var(--avatarBg); color:var(--avatarInk);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px;
  }
  .avatar.sm{ width:34px; height:34px; font-size:14px; }
  .avatar.xs{ width:30px; height:30px; font-size:12.5px; border:2px solid #fff; }

  .xbtn{
    flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:var(--xbg);
    border:0; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }

  /* ---- redesigned compact block ---- */
  .pp-card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    overflow:hidden; margin-bottom:14px;
  }
  .pp-collapsed{
    display:flex; align-items:center; gap:14px; padding:13px 14px; cursor:pointer;
    width:100%; background:transparent; border:0; text-align:left; font:inherit;
  }
  .stack{ display:flex; align-items:center; }
  .stack .avatar.xs{ margin-left:-10px; box-shadow:0 0 0 0 transparent; }
  .stack .avatar.xs:first-child{ margin-left:0; }
  .stack .overflow{
    width:30px; height:30px; border-radius:50%; background:#e1e5ea; color:#5a6068;
    border:2px solid #fff; margin-left:-10px; display:flex; align-items:center;
    justify-content:center; font-weight:700; font-size:12px;
  }
  .pp-collapsed .cap{ flex:1; }
  .pp-collapsed .cap .t{ font-size:15.5px; font-weight:700; color:var(--ink); }
  .pp-collapsed .cap .s{ font-size:12.5px; color:var(--muted); margin-top:1px; }
  .pp-chev{ color:#9aa3ab; transition:transform .22s; }
  .pp-card.open .pp-chev{ transform:rotate(180deg); }

  .pp-expanded{ display:none; border-top:1px solid var(--line); }
  .pp-card.open .pp-expanded{ display:block; }
  .pp-search{
    display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line);
  }
  .pp-search input{
    flex:1; border:0; background:transparent; font:inherit; font-size:14.5px; outline:none; color:var(--ink);
  }
  .pp-search .mag{ color:#9aa3ab; }
  .pp-list{ max-height:188px; overflow-y:auto; padding:6px 6px; }
  .pp-list::-webkit-scrollbar{ width:6px; }
  .pp-list::-webkit-scrollbar-thumb{ background:#cdd2d8; border-radius:99px; }
  .pp-row{
    display:flex; align-items:center; gap:12px; padding:9px 8px; border-radius:10px;
    transition:background .15s, opacity .2s, transform .2s;
  }
  .pp-row:hover{ background:#eef1f4; }
  .pp-row .name{ flex:1; font-size:15.5px; font-weight:600; }
  .pp-row.leaving{ opacity:0; transform:translateX(12px); }
  .pp-foot{
    padding:9px 14px; border-top:1px solid var(--line); font-size:12.5px; color:var(--muted);
    display:flex; align-items:center; justify-content:space-between;
  }
  .pp-foot button{
    border:0; background:transparent; color:var(--blue); font:inherit; font-weight:700;
    font-size:13px; cursor:pointer; padding:2px 4px;
  }

  /* ---- messages ---- */
  .msg-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:16px; margin-bottom:16px;
  }
  .msg-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .msg-head .m{ font-size:16px; color:var(--muted); }
  .msg-head .link{ font-size:14.5px; color:var(--blue); font-weight:600; cursor:pointer; }
  .msg{
    background:#fff; border-radius:12px; padding:14px 14px 16px; margin-bottom:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.03);
  }
  .msg .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:11px; }
  .msg .who{ font-size:16px; font-weight:700; }
  .msg .when{ font-size:13px; color:var(--muted); }
  .msg .body{ background:var(--bubble); border-radius:9px; padding:12px 13px; font-size:15.5px; color:#33373c; }
  .composer{
    background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:8px;
  }
  .composer .ph{ font-size:15.5px; color:var(--muted2); min-height:40px; }
  .composer .row{ display:flex; align-items:center; justify-content:flex-end; gap:12px; margin-top:8px; }
  .c-btn{ width:42px; height:42px; border-radius:50%; background:#eef0f2; border:0; display:flex;
    align-items:center; justify-content:center; cursor:pointer; color:#5a6068; }
  .c-btn.send{ background:var(--send); color:#fff; }

  .navbar{
    height:46px; background:#11151b; display:flex; align-items:center; justify-content:space-around;
    color:#cfd3d9;
  }
  .navbar .n{ width:18px; height:18px; opacity:.85; }

  /* ---- add sheet ---- */
  .sheet-wrap{ position:absolute; inset:0; display:none; z-index:20; }
  .sheet-wrap.show{ display:block; }
  .sheet-backdrop{ position:absolute; inset:0; background:rgba(17,21,27,.42); opacity:0; transition:.22s; }
  .sheet-wrap.show .sheet-backdrop{ opacity:1; }
  .sheet{
    position:absolute; left:0; right:0; bottom:0; background:#fff; border-radius:22px 22px 0 0;
    transform:translateY(100%); transition:transform .26s cubic-bezier(.22,.61,.36,1);
    max-height:74%; display:flex; flex-direction:column; padding-bottom:8px;
  }
  .sheet-wrap.show .sheet{ transform:translateY(0); }
  .sheet-grab{ width:42px; height:5px; border-radius:99px; background:#d3d7dd; margin:10px auto 4px; }
  .sheet-head{ padding:6px 18px 12px; }
  .sheet-head .t{ font-size:18px; font-weight:700; }
  .sheet-head .s{ font-size:13px; color:var(--muted); margin-top:2px; }
  .sheet-search{
    margin:0 16px 8px; display:flex; align-items:center; gap:8px;
    background:var(--card); border:1px solid var(--line); border-radius:11px; padding:11px 13px;
  }
  .sheet-search input{ flex:1; border:0; background:transparent; outline:none; font:inherit; font-size:15px; }
  .sheet-list{ overflow-y:auto; padding:4px 10px 6px; }
  .sheet-row{
    display:flex; align-items:center; gap:12px; padding:11px 10px; border-radius:11px; cursor:pointer;
  }
  .sheet-row:hover{ background:#eef1f4; }
  .sheet-row .name{ flex:1; font-size:15.5px; font-weight:600; }
  .sheet-add{
    border:1.6px solid var(--navy); color:var(--navy); background:#fff; border-radius:999px;
    padding:6px 14px; font:inherit; font-weight:700; font-size:13.5px; cursor:pointer;
  }
  .sheet-add.done{ border-color:#1f9d57; color:#1f9d57; background:#eaf7ef; }
  .sheet-empty{ text-align:center; color:var(--muted); font-size:14px; padding:26px 0; }

  /* toast */
  .toast{
    position:absolute; left:50%; bottom:64px; transform:translateX(-50%) translateY(14px);
    background:#22262b; color:#fff; font-size:13.5px; font-weight:600; padding:10px 16px;
    border-radius:999px; opacity:0; pointer-events:none; transition:.25s; z-index:30; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useMemo, useRef } = React;

    const initialPeople = [
      "Victor Bernardi","Juan Juan","Mateo Bernardi","Lucía Gómez","Pedro Sosa",
      "Ana Torres","Diego Ramírez","Sofía Díaz","Martín Pérez","Carla Núñez"
    ];
    const addablePool = [
      "Roberto Vega","Elena Cruz","Tomás Ruiz","Valentina Ríos","Nicolás Herrera",
      "Camila Flores","Andrés Molina","Paula Acosta","Federico Luna","Julieta Vera"
    ];

    const initials = (n) => n.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();

    function Avatar({ name, cls="" }){
      return <div className={"avatar "+cls}>{initials(name)}</div>;
    }
    function ChevDown({ size=22 }){
      return (<svg width={size} height={size} viewBox="0 0 24 24" fill="none">
        <path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>);
    }
    function Mag(){
      return (<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="2"/><path d="M20 20l-3.2-3.2" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>);
    }
    function XIcon(){
      return (<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"/></svg>);
    }

    /* ---------- Legacy view (the current problem) ---------- */
    function LegacyParticipants({ people }){
      return (
        <div>
          <div className="sec-head">
            <span className="label">Participantes</span>
            <div className="actions">
              <button className="iconbtn">i</button>
              <button className="agregar"><span className="plus">+</span> Agregar</button>
            </div>
          </div>
          {people.map((p,i)=>(
            <div className="legacy-card" key={i}>
              <Avatar name={p} />
              <span className="name">{p}</span>
              <button className="xbtn"><XIcon/></button>
            </div>
          ))}
        </div>
      );
    }

    /* ---------- Redesigned compact block ---------- */
    function CompactParticipants({ people, onRemove, onOpenAdd }){
      const [open, setOpen] = useState(false);
      const [q, setQ] = useState("");
      const [leaving, setLeaving] = useState(null);

      const shown = useMemo(()=>{
        const t = q.trim().toLowerCase();
        return t ? people.filter(p=>p.toLowerCase().includes(t)) : people;
      }, [people, q]);

      const remove = (name) => {
        setLeaving(name);
        setTimeout(()=>{ onRemove(name); setLeaving(null); }, 200);
      };

      const previews = people.slice(0,4);
      const extra = people.length - previews.length;

      return (
        <div>
          <div className="sec-head">
            <span className="label">Participantes</span>
            <div className="actions">
              <button className="iconbtn">i</button>
              <button className="agregar" onClick={onOpenAdd}><span className="plus">+</span> Agregar</button>
            </div>
          </div>

          <div className={"pp-card"+(open?" open":"")}>
            <button className="pp-collapsed" onClick={()=>setOpen(o=>!o)}>
              <div className="stack">
                {previews.map((p,i)=><div className="avatar xs" key={i}>{initials(p)}</div>)}
                {extra>0 && <div className="overflow">+{extra}</div>}
              </div>
              <div className="cap">
                <div className="t">{people.length} participantes</div>
                <div className="s">{open ? "Tocá para contraer" : "Tocá para ver y administrar"}</div>
              </div>
              <span className="pp-chev"><ChevDown/></span>
            </button>

            <div className="pp-expanded">
              {people.length > 6 && (
                <div className="pp-search">
                  <span className="mag"><Mag/></span>
                  <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar participante" />
                </div>
              )}
              <div className="pp-list">
                {shown.length === 0 && <div className="sheet-empty">Sin resultados</div>}
                {shown.map((p)=>(
                  <div className={"pp-row"+(leaving===p?" leaving":"")} key={p}>
                    <Avatar name={p} cls="sm" />
                    <span className="name">{p}</span>
                    <button className="xbtn" onClick={()=>remove(p)}><XIcon/></button>
                  </div>
                ))}
              </div>
              <div className="pp-foot">
                <span>{people.length} en total</span>
                <button onClick={onOpenAdd}>+ Agregar participante</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- Add bottom sheet ---------- */
    function AddSheet({ show, pool, onClose, onAdd }){
      const [q, setQ] = useState("");
      const [justAdded, setJustAdded] = useState([]);
      const list = useMemo(()=>{
        const t=q.trim().toLowerCase();
        return t ? pool.filter(p=>p.toLowerCase().includes(t)) : pool;
      }, [pool, q]);

      const add = (name) => {
        setJustAdded(a=>[...a,name]);
        onAdd(name);
        setTimeout(()=>setJustAdded(a=>a.filter(n=>n!==name)), 900);
      };

      return (
        <div className={"sheet-wrap"+(show?" show":"")}>
          <div className="sheet-backdrop" onClick={onClose}></div>
          <div className="sheet">
            <div className="sheet-grab"></div>
            <div className="sheet-head">
              <div className="t">Agregar participantes</div>
              <div className="s">Tocá una persona para sumarla a la conversación</div>
            </div>
            <div className="sheet-search">
              <span className="mag" style={{color:"#9aa3ab"}}><Mag/></span>
              <input autoFocus={false} value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar por nombre" />
            </div>
            <div className="sheet-list">
              {list.length===0 && <div className="sheet-empty">No hay más personas para agregar</div>}
              {list.map((p)=>{
                const done = justAdded.includes(p);
                return (
                  <div className="sheet-row" key={p} onClick={()=>!done && add(p)}>
                    <Avatar name={p} cls="sm" />
                    <span className="name">{p}</span>
                    <button className={"sheet-add"+(done?" done":"")}>{done?"✓ Agregado":"+ Agregar"}</button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ---------- Messages ---------- */
    function Messages(){
      return (
        <div>
          <div className="msg-panel">
            <div className="msg-head">
              <span className="m">Mensajes</span>
              <span className="link">Mostrar información completa</span>
            </div>
            <div className="msg">
              <div className="top">
                <span className="who">Mateo Bernardi</span>
                <span className="when">06/06/2026 08:43</span>
              </div>
              <div className="body">Que tal!!</div>
            </div>
            <div className="composer">
              <div className="ph">Escribir mensaje</div>
              <div className="row">
                <button className="c-btn">+</button>
                <button className="c-btn">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3.2" stroke="currentColor" strokeWidth="1.8"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/><path d="M18 7v6M21 10h-6" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
                </button>
                <button className="c-btn send">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12l16-7-7 16-2.5-6.5L4 12z" fill="currentColor"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- App ---------- */
    function App(){
      const [mode, setMode] = useState("new"); // 'new' | 'old'
      const [people, setPeople] = useState(initialPeople);
      const [pool, setPool] = useState(addablePool);
      const [sheet, setSheet] = useState(false);
      const [toast, setToast] = useState("");
      const toastT = useRef(null);

      const flash = (m) => {
        setToast(m); clearTimeout(toastT.current);
        toastT.current = setTimeout(()=>setToast(""), 1600);
      };

      const removePerson = (name) => {
        setPeople(ps=>ps.filter(p=>p!==name));
        setPool(pl=>[name,...pl]);
        flash(name+" quitado");
      };
      const addPerson = (name) => {
        setPeople(ps=>[...ps,name]);
        setPool(pl=>pl.filter(p=>p!==name));
        flash(name+" agregado");
      };

      // truncated summary line
      const summary = useMemo(()=>{
        const head = people.slice(0,2).join(", ");
        const rest = people.length-2;
        return rest>0 ? <>Participantes: {head} <span className="more">+{rest} más</span></>
                      : <>Participantes: {people.join(", ")}</>;
      }, [people]);

      return (
        <>
          <div className="demo-toggle">
            <button className={mode==="old"?"on":""} onClick={()=>setMode("old")}>Versión actual</button>
            <button className={mode==="new"?"on":""} onClick={()=>setMode("new")}>Rediseño</button>
          </div>
          <div className="demo-hint">
            {mode==="old"
              ? <>La lista apila una tarjeta por persona — con <b>{people.length} participantes</b> hay que hacer scroll largo para llegar al chat.</>
              : <>Bloque <b>compacto y plegable</b> con alto fijo: el chat queda siempre a la vista. Tocá la tarjeta para administrar.</>}
          </div>

          <div className="phone">
            <div className="statusbar">
              <span>08:43</span>
              <span className="sb-right">
                <span className="bar" style={{height:7}}></span>
                <span className="bar" style={{height:10}}></span>
                <span className="bar" style={{height:13}}></span>
                <span className="sb-batt">68</span>
              </span>
            </div>
            <div className="screen">
              <div className="modal">
                <div className="modal-grab">
                  <button className="chev"><ChevDown/></button>
                </div>
                <div className="modal-body">
                  <div className="summary">{summary}</div>
                  {mode==="old"
                    ? <LegacyParticipants people={people} />
                    : <CompactParticipants people={people} onRemove={removePerson} onOpenAdd={()=>setSheet(true)} />}
                  <Messages />
                </div>
              </div>

              <AddSheet show={sheet} pool={pool} onClose={()=>setSheet(false)} onAdd={addPerson} />
              <div className={"toast"+(toast?" show":"")}>{toast}</div>
            </div>
            <div className="navbar">
              <span className="n">▮▮▮</span>
              <span className="n">◯</span>
              <span className="n">‹</span>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
