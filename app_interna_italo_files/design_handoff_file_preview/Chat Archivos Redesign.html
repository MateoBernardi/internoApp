<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat — Archivos & Previews</title>
<style>
  :root{
    --ink:#1c2024; --muted:#7a8087; --muted2:#9aa3ab; --line:#e8eaed;
    --card:#f6f7f9; --panel:#eef0f2; --bubble:#ededf0; --blue:#2f78e8;
    --send:#5b9bf0; --avatarBg:#cfe0f7; --avatarInk:#3b6fd4; --navy:#2b1f5c;
    --red:#e2543b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:#dfe2e6; color:var(--ink);
    display:flex; flex-direction:column; align-items:center;
    min-height:100%; padding:22px 12px 40px; gap:14px;
  }
  .demo-toggle{ display:inline-flex; background:#cfd3d9; border-radius:999px; padding:4px; gap:4px;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.08); font-size:13px; user-select:none; }
  .demo-toggle button{ border:0; background:transparent; padding:8px 16px; border-radius:999px;
    font:inherit; font-weight:600; color:#5a6068; cursor:pointer; transition:.18s; }
  .demo-toggle button.on{ background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.14); }
  .demo-hint{ font-size:12px; color:#5d636b; max-width:392px; text-align:center; line-height:1.5; }
  .demo-hint b{ color:#33373c; }

  .phone{ width:392px; max-width:100%; height:812px; background:#fff; border-radius:30px;
    position:relative; overflow:hidden;
    box-shadow:0 18px 50px rgba(20,24,30,.28), 0 0 0 9px #11151b, 0 0 0 10px #2a2f37; }
  .statusbar{ height:34px; display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; font-size:13px; font-weight:600; color:#22262b; background:#eef0f2; }
  .sb-right{ display:flex; align-items:center; gap:6px; }
  .sb-right .bar{ width:3px; border-radius:1px; background:#22262b; }
  .sb-batt{ font-size:10px; background:#22262b; color:#fff; border-radius:5px; padding:1px 5px; font-weight:700; }
  .screen{ position:absolute; inset:34px 0 0; background:#7d8186; overflow:hidden; }
  .modal{ position:absolute; left:0; right:0; bottom:0; top:46px; background:#fff;
    border-radius:22px 22px 0 0; display:flex; flex-direction:column; overflow:hidden; }
  .modal-grab{ height:54px; border-bottom:1px solid var(--line); display:flex; align-items:center;
    justify-content:flex-end; padding:0 18px; flex:0 0 auto; }
  .chev{ width:42px; height:42px; border-radius:50%; background:#eef0f2; border:0; display:flex;
    align-items:center; justify-content:center; cursor:pointer; color:#8a9097; }
  .modal-body{ flex:1 1 auto; overflow-y:auto; padding:14px 18px 0; }
  .modal-body::-webkit-scrollbar{ width:0; }

  /* ---- conversation header (replaces the lone (i) button) ---- */
  .conv-head{ display:flex; align-items:center; gap:12px; width:100%; text-align:left;
    background:var(--card); border:1px solid var(--line); border-radius:14px; padding:11px 12px;
    cursor:pointer; font:inherit; margin-bottom:14px; }
  .conv-head .id{ flex:1; min-width:0; }
  .conv-head .id .t{ font-size:16px; font-weight:700; color:var(--ink); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .conv-head .id .s{ font-size:12.5px; color:var(--muted); margin-top:1px; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  .conv-files{ display:flex; align-items:center; gap:7px; flex:0 0 auto; color:var(--navy);
    background:#fff; border:1px solid var(--line); border-radius:999px; padding:7px 11px; font-weight:700; font-size:13px; }
  .conv-files .cnt{ background:var(--avatarBg); color:var(--avatarInk); border-radius:999px;
    min-width:20px; height:20px; padding:0 5px; display:flex; align-items:center; justify-content:center; font-size:12px; }
  .group-ic{ width:44px; height:44px; border-radius:50%; background:var(--avatarBg); color:var(--avatarInk);
    display:flex; align-items:center; justify-content:center; flex:0 0 auto; }

  .avatar{ flex:0 0 auto; width:44px; height:44px; border-radius:50%; background:var(--avatarBg);
    color:var(--avatarInk); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:17px; }
  .avatar.sm{ width:36px; height:36px; font-size:14px; }

  /* ---- messages ---- */
  .msg-panel{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:14px; }
  .msg-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .msg-head .m{ font-size:16px; color:var(--muted); }
  .msg-head .link{ font-size:14px; color:var(--blue); font-weight:600; cursor:pointer; }
  .msg-scrollhint{ width:120px; height:4px; border-radius:99px; background:#dfe2e6; margin:6px auto 12px; }
  .msg{ background:#fff; border-radius:12px; padding:13px 14px 14px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,.03); }
  .msg .top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .msg .who{ font-size:15.5px; font-weight:700; }
  .msg .when{ font-size:12.5px; color:var(--muted); }
  .msg .text{ background:var(--bubble); border-radius:9px; padding:11px 13px; font-size:15px; color:#33373c; }

  /* image thumb */
  .thumb{ display:inline-block; border:0; padding:0; background:transparent; cursor:pointer; width:100%; }
  .thumb .img{ position:relative; width:100%; height:158px; border-radius:11px; overflow:hidden;
    border:1px solid var(--line); }
  .thumb .img .glyph{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.9); }
  .thumb .img .expand{ position:absolute; right:8px; top:8px; width:30px; height:30px; border-radius:9px;
    background:rgba(17,21,27,.45); color:#fff; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
  .thumb .cap{ display:flex; align-items:center; gap:6px; margin-top:7px; font-size:13px; color:var(--muted); }
  .thumb .cap .nm{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* file chip */
  .filechip{ display:flex; align-items:center; gap:12px; width:100%; text-align:left; cursor:pointer;
    background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px 12px; font:inherit; }
  .filechip:hover{ background:#fafbfc; }
  .ftype{ width:44px; height:44px; border-radius:10px; flex:0 0 auto; display:flex; align-items:center;
    justify-content:center; color:#fff; font-size:11px; font-weight:800; letter-spacing:.04em; }
  .filechip .meta{ flex:1; min-width:0; }
  .filechip .meta .nm{ font-size:14.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .filechip .meta .sz{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .filechip .go{ color:var(--muted2); flex:0 0 auto; }

  /* composer */
  .composer{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:8px; }
  .composer .ph{ font-size:15px; color:var(--muted2); min-height:34px; }
  .composer .row{ display:flex; align-items:center; justify-content:flex-end; gap:12px; margin-top:6px; }
  .c-btn{ width:42px; height:42px; border-radius:50%; background:#eef0f2; border:0; display:flex;
    align-items:center; justify-content:center; cursor:pointer; color:#5a6068; }
  .c-btn.send{ background:var(--send); color:#fff; }

  .navbar{ height:46px; background:#11151b; display:flex; align-items:center; justify-content:space-around; color:#cfd3d9; }

  /* ---- files modal ("Archivos de la conversación") ---- */
  .ov{ position:absolute; inset:0; display:none; z-index:20; }
  .ov.show{ display:block; }
  .ov-bd{ position:absolute; inset:0; background:rgba(17,21,27,.5); opacity:0; transition:.2s; }
  .ov.show .ov-bd{ opacity:1; }
  .files-card{ position:absolute; left:16px; right:16px; top:50%; transform:translateY(-50%) scale(.96);
    background:#fff; border-radius:20px; padding:20px 18px 14px; max-height:78%; display:flex; flex-direction:column;
    opacity:0; transition:.22s; box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .ov.show .files-card{ opacity:1; transform:translateY(-50%) scale(1); }
  .files-card h3{ margin:0 0 4px; font-size:21px; font-weight:800; }
  .files-card .sub{ font-size:13px; color:var(--muted); margin-bottom:14px; }
  .files-scroll{ overflow-y:auto; margin:0 -4px; padding:0 4px; }
  .files-scroll::-webkit-scrollbar{ width:6px; } .files-scroll::-webkit-scrollbar-thumb{ background:#cdd2d8; border-radius:99px; }
  .grp-label{ font-size:12px; font-weight:700; color:var(--muted2); text-transform:uppercase; letter-spacing:.05em; margin:8px 2px 8px; }
  .img-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px; }
  .img-cell{ border:0; padding:0; background:transparent; cursor:pointer; }
  .img-cell .ph{ height:104px; border-radius:11px; overflow:hidden; border:1px solid var(--line); position:relative; }
  .img-cell .nm{ font-size:11.5px; color:var(--muted); margin-top:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-row{ display:flex; align-items:center; gap:11px; width:100%; text-align:left; cursor:pointer;
    background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 11px; font:inherit; margin-bottom:8px; }
  .files-foot{ display:flex; justify-content:flex-end; padding-top:10px; }
  .files-foot button{ border:0; background:transparent; color:var(--red); font:inherit; font-weight:700; font-size:16px; cursor:pointer; padding:6px 4px; }

  /* ---- fullscreen viewer (image + file share chrome) ---- */
  .viewer{ position:absolute; inset:0; background:#0e1216; z-index:40; display:none; flex-direction:column; }
  .viewer.show{ display:flex; }
  .v-top{ height:56px; flex:0 0 auto; display:flex; align-items:center; gap:10px; padding:0 12px; color:#fff; }
  .v-top .vx{ width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.12); border:0; color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex:0 0 auto; }
  .v-top .vname{ flex:1; min-width:0; }
  .v-top .vname .t{ font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .v-top .vname .s{ font-size:12px; color:rgba(255,255,255,.55); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .v-body{ flex:1 1 auto; display:flex; align-items:center; justify-content:center; overflow:auto; padding:8px 16px; }
  .v-img{ max-width:100%; max-height:100%; border-radius:8px; overflow:hidden; width:330px; height:440px; position:relative; }
  /* file hero */
  .v-hero{ text-align:center; color:#fff; }
  .v-hero .big{ width:96px; height:96px; border-radius:22px; margin:0 auto 16px; display:flex;
    align-items:center; justify-content:center; color:#fff; font-size:20px; font-weight:800; letter-spacing:.04em; }
  .v-hero .hn{ font-size:17px; font-weight:700; max-width:280px; margin:0 auto; }
  .v-hero .hs{ font-size:13.5px; color:rgba(255,255,255,.6); margin-top:6px; }
  /* text preview */
  .v-text{ width:100%; max-width:340px; align-self:stretch; background:#fff; color:#23272c; border-radius:12px;
    padding:16px; font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace; font-size:13px; line-height:1.6;
    white-space:pre-wrap; overflow:auto; max-height:100%; }
  .v-actions{ flex:0 0 auto; display:flex; padding:10px 16px calc(14px + env(safe-area-inset-bottom));
    gap:10px; background:rgba(255,255,255,.04); border-top:1px solid rgba(255,255,255,.08); }
  .v-act{ flex:1; border:0; background:rgba(255,255,255,.08); color:#fff; border-radius:13px; padding:12px 6px;
    display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; font:inherit; font-size:12.5px; font-weight:600; }
  .v-act:active{ background:rgba(255,255,255,.16); }
  .v-act svg{ opacity:.95; }

  .toast{ position:absolute; left:50%; bottom:78px; transform:translateX(-50%) translateY(14px);
    background:#22262b; color:#fff; font-size:13.5px; font-weight:600; padding:11px 17px; border-radius:999px;
    opacity:0; pointer-events:none; transition:.25s; z-index:60; white-space:nowrap; display:flex; align-items:center; gap:9px; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast .dot{ width:8px; height:8px; border-radius:50%; background:#5fd08a; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useMemo, useRef } = React;

    /* ---------- file-type colors ---------- */
    const typeColor = (ext) => ({
      txt:"#5b6b7a", pdf:"#d64545", doc:"#2f6fd6", docx:"#2f6fd6",
      xls:"#1f9d57", xlsx:"#1f9d57", zip:"#b07a1e", csv:"#1f9d57"
    }[ext] || "#7a8087");

    /* ---------- icons ---------- */
    const Chev = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const ChevR = ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const ImgGlyph = ({s=40}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2.5" stroke="currentColor" strokeWidth="1.6"/><circle cx="8.5" cy="9.5" r="1.6" fill="currentColor"/><path d="M4 17l4.5-4.5 3.5 3.5 3-3L20 16" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const Expand = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M9 4H5a1 1 0 00-1 1v4M15 4h4a1 1 0 011 1v4M9 20H5a1 1 0 01-1-1v-4M15 20h4a1 1 0 001-1v-4" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;
    const FilesIc = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M21.5 11.5l-8 8a5 5 0 01-7-7l8.5-8.5a3.3 3.3 0 014.7 4.7l-8.5 8.5a1.6 1.6 0 01-2.3-2.3l7.8-7.8" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>;
    const Group = ({s=22}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="9" cy="9" r="3" stroke="currentColor" strokeWidth="1.7"/><path d="M3.5 19c0-3 2.4-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/><path d="M16 7.2a3 3 0 010 5.6M17 19c0-2.2-1-3.9-2.6-4.6" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/></svg>;
    const X = ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/></svg>;
    const Share = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3v12M12 3L8 7M12 3l4 4" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"/><path d="M5 12v6a2 2 0 002 2h10a2 2 0 002-2v-6" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round"/></svg>;
    const Download = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 4v11M12 15l-4-4M12 15l4-4" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"/><path d="M5 19h14" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round"/></svg>;
    const Print = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M7 9V4h10v5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><rect x="4" y="9" width="16" height="7" rx="1.6" stroke="currentColor" strokeWidth="1.8"/><rect x="7" y="14" width="10" height="6" rx="1" stroke="currentColor" strokeWidth="1.8"/><circle cx="16.5" cy="12" r="1" fill="currentColor"/></svg>;
    const SendIc = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12l16-7-7 16-2.5-6.5L4 12z" fill="currentColor"/></svg>;
    const PlusIc = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>;

    const initials = (n) => n.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();

    /* striped image placeholder (stands in for the real screenshot/photo) */
    function Placeholder({ hue, label }){
      const bg = `repeating-linear-gradient(135deg, hsl(${hue} 42% 88%) 0 12px, hsl(${hue} 42% 83%) 12px 24px)`;
      return (
        <div style={{position:"absolute", inset:0, background:bg, display:"flex", alignItems:"center", justifyContent:"center"}}>
          <div style={{color:`hsl(${hue} 38% 52%)`}}><ImgGlyph s={34} /></div>
          {label && <div style={{position:"absolute", left:8, bottom:7, fontFamily:"ui-monospace,Menlo,monospace",
            fontSize:10, color:`hsl(${hue} 30% 38%)`, background:"rgba(255,255,255,.55)", padding:"2px 6px", borderRadius:6,
            maxWidth:"calc(100% - 16px)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{label}</div>}
        </div>
      );
    }

    /* ---------- in-message attachments ---------- */
    function ImageThumb({ file, onOpen }){
      return (
        <button className="thumb" onClick={onOpen}>
          <div className="img">
            <Placeholder hue={file.hue} label={file.ext.toUpperCase()} />
            <span className="expand"><Expand/></span>
          </div>
          <div className="cap"><ImgGlyph s={15}/><span className="nm">{file.name}</span></div>
        </button>
      );
    }
    function FileChip({ file, onOpen }){
      return (
        <button className="filechip" onClick={onOpen}>
          <span className="ftype" style={{background:typeColor(file.ext)}}>{file.ext.toUpperCase()}</span>
          <span className="meta">
            <div className="nm">{file.name}</div>
            <div className="sz">{file.ext.toUpperCase()} · {file.size}</div>
          </span>
          <span className="go"><ChevR/></span>
        </button>
      );
    }

    /* ---------- fullscreen viewers ---------- */
    function ViewerActions({ onAct }){
      return (
        <div className="v-actions">
          <button className="v-act" onClick={()=>onAct("share")}><Share/>Compartir</button>
          <button className="v-act" onClick={()=>onAct("download")}><Download/>Descargar</button>
          <button className="v-act" onClick={()=>onAct("print")}><Print/>Imprimir</button>
        </div>
      );
    }

    function ImageViewer({ file, onClose, onAct }){
      return (
        <div className={"viewer"+(file?" show":"")}>
          {file && <>
            <div className="v-top">
              <button className="vx" onClick={onClose}><X/></button>
              <div className="vname"><div className="t">{file.name}</div><div className="s">{file.sender} · {file.date}</div></div>
            </div>
            <div className="v-body">
              <div className="v-img"><Placeholder hue={file.hue} label={file.ext.toUpperCase()+" · "+file.size} /></div>
            </div>
            <ViewerActions onAct={onAct} />
          </>}
        </div>
      );
    }

    function FileViewer({ file, onClose, onAct }){
      return (
        <div className={"viewer"+(file?" show":"")}>
          {file && <>
            <div className="v-top">
              <button className="vx" onClick={onClose}><X/></button>
              <div className="vname"><div className="t">{file.name}</div><div className="s">{file.ext.toUpperCase()} · {file.size} · {file.sender}</div></div>
            </div>
            <div className="v-body">
              {file.preview
                ? <pre className="v-text">{file.preview}</pre>
                : <div className="v-hero">
                    <div className="big" style={{background:typeColor(file.ext)}}>{file.ext.toUpperCase()}</div>
                    <div className="hn">{file.name}</div>
                    <div className="hs">{file.ext.toUpperCase()} · {file.size}<br/>Vista previa no disponible para este tipo</div>
                  </div>}
            </div>
            <ViewerActions onAct={onAct} />
          </>}
        </div>
      );
    }

    /* ---------- files modal ---------- */
    function FilesModal({ show, files, onClose, onOpen }){
      const images = files.filter(f=>f.kind==="image");
      const docs = files.filter(f=>f.kind==="file");
      return (
        <div className={"ov"+(show?" show":"")}>
          <div className="ov-bd" onClick={onClose}></div>
          <div className="files-card">
            <h3>Archivos de la conversación</h3>
            <div className="sub">{images.length} imágenes · {docs.length} archivos</div>
            <div className="files-scroll">
              {images.length>0 && <>
                <div className="grp-label">Imágenes</div>
                <div className="img-grid">
                  {images.map(f=>(
                    <button className="img-cell" key={f.id} onClick={()=>onOpen(f)}>
                      <div className="ph"><Placeholder hue={f.hue} label={f.ext.toUpperCase()} /></div>
                      <div className="nm">{f.name}</div>
                    </button>
                  ))}
                </div>
              </>}
              {docs.length>0 && <>
                <div className="grp-label">Archivos</div>
                {docs.map(f=>(
                  <button className="file-row" key={f.id} onClick={()=>onOpen(f)}>
                    <span className="ftype" style={{background:typeColor(f.ext)}}>{f.ext.toUpperCase()}</span>
                    <span className="meta" style={{flex:1, minWidth:0}}>
                      <div className="nm" style={{fontSize:14.5, fontWeight:600, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{f.name}</div>
                      <div className="sz" style={{fontSize:12.5, color:"var(--muted)", marginTop:2}}>{f.ext.toUpperCase()} · {f.size}</div>
                    </span>
                    <span className="go" style={{color:"var(--muted2)"}}><ChevR/></span>
                  </button>
                ))}
              </>}
            </div>
            <div className="files-foot"><button onClick={onClose}>Cerrar</button></div>
          </div>
        </div>
      );
    }

    /* ---------- app ---------- */
    function App(){
      const [variant, setVariant] = useState("group"); // 'group' | 'dm'
      const [filesOpen, setFilesOpen] = useState(false);
      const [imgView, setImgView] = useState(null);
      const [fileView, setFileView] = useState(null);
      const [toast, setToast] = useState("");
      const tRef = useRef(null);

      const flash = (m) => { setToast(m); clearTimeout(tRef.current); tRef.current=setTimeout(()=>setToast(""),1700); };
      const act = (kind) => flash(
        kind==="share" ? "Compartiendo archivo…" :
        kind==="download" ? "Guardado en Documentos" : "Preparando impresión…"
      );

      const files = useMemo(()=>([
        { id:"f1", kind:"image", name:"Screenshot from 2025-10-29 12-07-02.png", ext:"png", size:"1.4 MB", hue:212, sender:"Mateo Bernardi", date:"27/05/2026 13:39" },
        { id:"f2", kind:"file",  name:"INFOZONE.TXT (2).txt", ext:"txt", size:"2.1 KB", sender:"Juan Juan", date:"27/05/2026 13:41",
          preview:"# INFOZONE\n\nZona: Galpón 4 — Sector B\nResponsable: J. Juan\nEstado: ACTIVO\n\n[12:04] Ingreso de mercadería OK\n[12:31] Control de stock pendiente\n[13:02] Revisar etiquetas lote #4471\n\nNotas:\n- Coordinar con depósito central\n- Confirmar remito antes de las 18:00" },
        { id:"f3", kind:"image", name:"Reporte-ventas-mayo.png", ext:"png", size:"860 KB", hue:150, sender:"Mateo Bernardi", date:"27/05/2026 13:42" },
      ]),[]);
      const byId = (id) => files.find(f=>f.id===id);

      const openFile = (f) => {
        setFilesOpen(false);
        if(f.kind==="image") setImgView(f); else setFileView(f);
      };

      const header = variant==="dm"
        ? { avatar:<div className="avatar">{initials("Victor Bernardi")}</div>, t:"Victor Bernardi", s:"Conversación directa · toca para ver archivos" }
        : { avatar:<div className="group-ic"><Group/></div>, t:"Tenemos que hacer una cosa", s:"3 participantes · toca para ver archivos" };

      return (
        <>
          <div className="demo-toggle">
            <button className={variant==="dm"?"on":""} onClick={()=>setVariant("dm")}>Conversación 1:1</button>
            <button className={variant==="group"?"on":""} onClick={()=>setVariant("group")}>Grupo</button>
          </div>
          <div className="demo-hint">
            El botón <b>(i)</b> se reemplaza por la <b>identidad de la conversación</b> — {variant==="dm"?<>el nombre del otro usuario</>:<>el asunto del grupo</>} — y es clickable para abrir <b>Archivos de la conversación</b>. Tocá una imagen o archivo para abrir su visor.
          </div>

          <div className="phone">
            <div className="statusbar">
              <span>09:15</span>
              <span className="sb-right"><span className="bar" style={{height:7}}></span><span className="bar" style={{height:10}}></span><span className="bar" style={{height:13}}></span><span className="sb-batt">67</span></span>
            </div>
            <div className="screen">
              <div className="modal">
                <div className="modal-grab"><button className="chev"><Chev/></button></div>
                <div className="modal-body">

                  {/* conversation header replacing (i) */}
                  <button className="conv-head" onClick={()=>setFilesOpen(true)}>
                    {header.avatar}
                    <span className="id"><div className="t">{header.t}</div><div className="s">{header.s}</div></span>
                    <span className="conv-files"><FilesIc/><span className="cnt">{files.length}</span></span>
                  </button>

                  {/* messages */}
                  <div className="msg-panel">
                    <div className="msg-head"><span className="m">Mensajes</span><span className="link">Mostrar información completa</span></div>
                    <div className="msg-scrollhint"></div>

                    <div className="msg">
                      <div className="top"><span className="who">Mateo Bernardi</span><span className="when">27/05/2026 13:39</span></div>
                      <ImageThumb file={byId("f1")} onOpen={()=>setImgView(byId("f1"))} />
                    </div>

                    <div className="msg">
                      <div className="top"><span className="who">Juan Juan</span><span className="when">27/05/2026 13:41</span></div>
                      <FileChip file={byId("f2")} onOpen={()=>setFileView(byId("f2"))} />
                    </div>

                    <div className="msg">
                      <div className="top"><span className="who">Mateo Bernardi</span><span className="when">27/05/2026 13:42</span></div>
                      <ImageThumb file={byId("f3")} onOpen={()=>setImgView(byId("f3"))} />
                    </div>

                    <div className="msg">
                      <div className="top"><span className="who">Juan Juan</span><span className="when">27/05/2026 13:44</span></div>
                      <div className="text">perfecto</div>
                    </div>

                    <div className="composer">
                      <div className="ph">Escribir mensaje</div>
                      <div className="row">
                        <button className="c-btn"><PlusIc/></button>
                        <button className="c-btn send"><SendIc/></button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <FilesModal show={filesOpen} files={files} onClose={()=>setFilesOpen(false)} onOpen={openFile} />
              <ImageViewer file={imgView} onClose={()=>setImgView(null)} onAct={act} />
              <FileViewer file={fileView} onClose={()=>setFileView(null)} onAct={act} />
              <div className={"toast"+(toast?" show":"")}><span className="dot"></span>{toast}</div>
            </div>
            <div className="navbar"><span>▮▮▮</span><span>◯</span><span>‹</span></div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
